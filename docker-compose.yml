services:
  # ── PostgreSQL ───────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: hideyou_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: hideyou
      POSTGRES_USER: hideyou
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - hideyou_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hideyou"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: hideyou_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - hideyou_internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend API ──────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: hideyou_backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://hideyou:${POSTGRES_PASSWORD}@postgres:5432/hideyou
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - uploads_data:/app/uploads
    networks:
      - hideyou_internal
      - hideyou_external
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:4000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Frontend ─────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
      # NEXT_PUBLIC_* переменные запекаются в JS-бандл во время сборки,
      # поэтому их нужно передавать как build args, а не только как environment.
      args:
        - NEXT_PUBLIC_TG_BOT_NAME=${TELEGRAM_BOT_NAME}
        - NEXT_PUBLIC_API_URL=/api
    container_name: hideyou_frontend
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: /api
      INTERNAL_API_URL: http://backend:4000
      NEXT_PUBLIC_TG_BOT_NAME: ${TELEGRAM_BOT_NAME}
    depends_on:
      - backend
    networks:
      - hideyou_internal
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Telegram Bot ─────────────────────────────────────────────
  bot:
    build:
      context: ./backend
      dockerfile: Dockerfile.bot
      target: production
    container_name: hideyou_bot
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://hideyou:${POSTGRES_PASSWORD}@postgres:5432/hideyou
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - hideyou_internal
      - hideyou_external

  # ── Nginx ────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: hideyou_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - backend
      - frontend
    networks:
      - hideyou_internal
      - hideyou_external

volumes:
  postgres_data:
  redis_data:
  uploads_data:
  nginx_logs:

networks:
  hideyou_internal:
    driver: bridge
    internal: true
  hideyou_external:
    driver: bridge
