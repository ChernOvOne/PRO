services:
  # ── PostgreSQL ───────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: hideyou_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: hideyou
      POSTGRES_USER: hideyou
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: Europe/Moscow
      PGTZ: Europe/Moscow
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - hideyou_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hideyou"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: hideyou_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - hideyou_internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend API ──────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: hideyou_backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://hideyou:${POSTGRES_PASSWORD}@postgres:5432/hideyou
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      NODE_ENV: production
      TZ: Europe/Moscow
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - uploads_data:/app/uploads
      - ./.env:/app/.env
      - ./data/backups:/app/data/backups
    networks:
      - hideyou_internal
      - hideyou_external
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:4000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Frontend ─────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
      # NEXT_PUBLIC_* переменные запекаются в JS-бандл во время сборки,
      # поэтому их нужно передавать как build args, а не только как environment.
      args:
        - NEXT_PUBLIC_TG_BOT_NAME=${TELEGRAM_BOT_NAME}
        - NEXT_PUBLIC_API_URL=/api
        - NEXT_PUBLIC_MAPTILER_KEY=${MAPTILER_KEY}
        - NEXT_PUBLIC_YANDEX_KEY=${YANDEX_MAPS_KEY}
    container_name: hideyou_frontend
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_PUBLIC_API_URL: /api
      INTERNAL_API_URL: http://backend:4000
      NEXT_PUBLIC_TG_BOT_NAME: ${TELEGRAM_BOT_NAME}
      NEXT_PUBLIC_MAPTILER_KEY: ${MAPTILER_KEY}
      NEXT_PUBLIC_YANDEX_KEY: ${YANDEX_MAPS_KEY}
      TZ: Europe/Moscow
    depends_on:
      - backend
    networks:
      - hideyou_internal
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Telegram Bot ─────────────────────────────────────────────
  bot:
    build:
      context: ./backend
      dockerfile: Dockerfile.bot
      target: production
    container_name: hideyou_bot
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://hideyou:${POSTGRES_PASSWORD}@postgres:5432/hideyou
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      NODE_ENV: production
      TZ: Europe/Moscow
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - hideyou_internal
      - hideyou_external

  # ── Nginx ────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: hideyou_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - certbot_webroot:/var/www/certbot:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - backend
      - frontend
    networks:
      - hideyou_internal
      - hideyou_external

  # ── Updater sidecar ──────────────────────────────────────────
  # Listens on Redis queue `update:queue` for update/rollback/backup jobs.
  # Mounts the host repo, /etc/letsencrypt, uploads volume, and docker socket.
  updater:
    build:
      context: ./updater
      dockerfile: Dockerfile
    container_name: hideyou_updater
    restart: unless-stopped
    env_file: .env
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      DATABASE_URL: postgresql://hideyou:${POSTGRES_PASSWORD}@postgres:5432/hideyou
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      NGINX_CONTAINER: hideyou_nginx
      COMPOSE_PROJECT: lkhy
      REPO_DIR: /opt/pro/LKHY
      TG_BACKUP_TOKEN: ${TG_BACKUP_TOKEN:-}
      TG_BACKUP_CHAT: ${TG_BACKUP_CHAT:-}
      INTERNAL_HEALTH_URL: http://backend:4000
      TZ: Europe/Moscow
    volumes:
      # Mount repo at SAME path inside container as on host.
      # This way `docker compose -f /opt/pro/LKHY/docker-compose.yml ...`
      # works correctly: compose CLI inside this container can read the file,
      # AND docker daemon on the host resolves bind mounts to the same dir.
      - /opt/pro/LKHY:/opt/pro/LKHY
      - ./data/backups:/backups
      - uploads_data:/uploads
      - /etc/letsencrypt:/letsencrypt
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - hideyou_internal
      - hideyou_external  # needed to reach GitHub (git fetch) and Telegram API

  # ── Certbot sidecar ──────────────────────────────────────────
  # Listens on Redis queue `cert:queue` for {domain, role, email} jobs,
  # issues Let's Encrypt cert via webroot, writes nginx vhost to
  # /etc/nginx/conf.d/, then reloads nginx via docker exec.
  # Also runs `certbot renew` every 12h.
  certbot:
    build:
      context: ./certbot
      dockerfile: Dockerfile
    container_name: hideyou_certbot
    restart: unless-stopped
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      NGINX_CONTAINER: hideyou_nginx
      CERTBOT_EMAIL: ${CERTBOT_EMAIL:-admin@example.com}
      CERTBOT_STAGING: ${CERTBOT_STAGING:-0}
      TZ: Europe/Moscow
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt
      - ./nginx/conf.d:/etc/nginx/conf.d
      - certbot_webroot:/var/www/certbot
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - hideyou_internal

volumes:
  postgres_data:
  redis_data:
  uploads_data:
  nginx_logs:
  certbot_webroot:

networks:
  hideyou_internal:
    driver: bridge
    internal: true
  hideyou_external:
    driver: bridge
