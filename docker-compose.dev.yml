# ── Development override ─────────────────────────────────────
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up
#
# Or just: make dev (alias in Makefile)
#
# This adds:
#   - Hot reload for backend (tsx watch)
#   - Hot reload for frontend (next dev)
#   - Adminer for database GUI
#   - Redis Commander for Redis GUI
#   - Source code volumes (no rebuild on change)

services:
  backend:
    build:
      target: builder          # Use builder stage (has dev deps)
    command: npm run dev
    environment:
      NODE_ENV: development
      LOG_LEVEL: debug
    volumes:
      - ./backend/src:/app/src:delegated
      - ./backend/prisma:/app/prisma:delegated
    ports:
      - "4000:4000"            # Expose directly for local dev
    networks:
      - hideyou_internal
      - hideyou_external       # Allow external access in dev

  frontend:
    build:
      target: deps
    command: npm run dev
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:4000/api
    volumes:
      - ./frontend/src:/app/src:delegated
      - ./frontend/public:/app/public:delegated
    ports:
      - "3000:3000"
    networks:
      - hideyou_internal
      - hideyou_external

  bot:
    build:
      target: builder
    command: npx tsx watch src/bot/runner.ts
    environment:
      NODE_ENV: development
    volumes:
      - ./backend/src:/app/src:delegated

  # ── Dev tools ───────────────────────────────────────────────
  adminer:
    image: adminer:latest
    container_name: hideyou_adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
      ADMINER_DESIGN: dracula
    networks:
      - hideyou_internal
      - hideyou_external
    profiles:
      - tools

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: hideyou_redis_ui
    restart: unless-stopped
    environment:
      REDIS_HOSTS: local:redis:6379:0:${REDIS_PASSWORD}
    ports:
      - "8081:8081"
    networks:
      - hideyou_internal
      - hideyou_external
    profiles:
      - tools
