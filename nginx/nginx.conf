worker_processes      auto;
worker_rlimit_nofile  65535;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
  worker_connections  4096;
  use epoll;
  multi_accept on;
}

http {
  include      /etc/nginx/mime.types;
  default_type application/octet-stream;

  log_format json_combined escape=json
    '{"time":"$time_iso8601","method":"$request_method","uri":"$request_uri",'
    '"status":$status,"bytes":$body_bytes_sent,"rt":"$request_time","ip":"$remote_addr"}';

  access_log /var/log/nginx/access.log json_combined buffer=16k flush=2s;

  sendfile            on;
  tcp_nopush          on;
  tcp_nodelay         on;
  keepalive_timeout   75s;
  keepalive_requests  1000;
  server_tokens       off;
  client_max_body_size 20m;

  gzip              on;
  gzip_vary         on;
  gzip_proxied      any;
  gzip_comp_level   6;
  gzip_min_length   1024;
  gzip_types text/plain text/css text/xml text/javascript application/json application/javascript image/svg+xml;

  limit_req_zone $binary_remote_addr zone=api:20m    rate=60r/m;
  limit_req_zone $binary_remote_addr zone=auth:10m   rate=10r/m;
  limit_req_zone $binary_remote_addr zone=webhook:5m rate=300r/m;
  limit_conn_zone $binary_remote_addr zone=perip:10m;

  ssl_protocols             TLSv1.2 TLSv1.3;
  ssl_ciphers               'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
  ssl_prefer_server_ciphers off;
  ssl_session_cache         shared:SSL:50m;
  ssl_session_timeout       1d;
  ssl_session_tickets       off;

  # Docker DNS резолвер.
  # ВАЖНО: upstream со статическим server резолвится один раз при старте.
  # Чтобы nginx переразрешал DNS после rebuild контейнеров — используем
  # переменные вместо upstream-блоков (proxy_pass http://$backend_host).
  resolver 127.0.0.11 valid=10s ipv6=off;
  resolver_timeout 5s;

  # Переменные для upstream — nginx резолвит их динамически через Docker DNS.
  # Это единственный надёжный способ избежать кеширования старых IP после rebuild.
  map $host $backend_host  { default "backend:4000";  }
  map $host $frontend_host { default "frontend:3000"; }

  # HTTP -> HTTPS redirect + certbot challenge (works for ALL domains)
  server {
    listen 80 default_server;
    server_name _;
    # ACME HTTP-01 challenge webroot used by certbot sidecar
    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
      default_type "text/plain";
      try_files $uri =404;
    }
    location / { return 301 https://$host$request_uri; }
  }

  # Real HTTPS vhosts are added by the setup wizard / certbot sidecar into
  # conf.d/ once a domain is configured and its certificate is issued. Until
  # then, only the port-80 server above is active — nginx will NOT listen on
  # 443 until an admin runs setup. This avoids the classic crash
  #   [emerg] cannot load certificate .../fullchain.pem: No such file
  # that used to happen when nginx.conf had hard-coded SSL vhosts for domains
  # that don't exist on this install.
  include /etc/nginx/conf.d/*.conf;

}
