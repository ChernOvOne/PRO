worker_processes      auto;
worker_rlimit_nofile  65535;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
  worker_connections  4096;
  use epoll;
  multi_accept on;
}

http {
  include      /etc/nginx/mime.types;
  default_type application/octet-stream;

  log_format json_combined escape=json
    '{"time":"$time_iso8601","method":"$request_method","uri":"$request_uri",'
    '"status":$status,"bytes":$body_bytes_sent,"rt":"$request_time","ip":"$remote_addr"}';

  access_log /var/log/nginx/access.log json_combined buffer=16k flush=2s;

  sendfile            on;
  tcp_nopush          on;
  tcp_nodelay         on;
  keepalive_timeout   75s;
  keepalive_requests  1000;
  server_tokens       off;
  client_max_body_size 20m;

  gzip              on;
  gzip_vary         on;
  gzip_proxied      any;
  gzip_comp_level   6;
  gzip_min_length   1024;
  gzip_types text/plain text/css text/xml text/javascript application/json application/javascript image/svg+xml;

  limit_req_zone $binary_remote_addr zone=api:20m    rate=60r/m;
  limit_req_zone $binary_remote_addr zone=auth:10m   rate=10r/m;
  limit_req_zone $binary_remote_addr zone=webhook:5m rate=300r/m;
  limit_conn_zone $binary_remote_addr zone=perip:10m;

  ssl_protocols             TLSv1.2 TLSv1.3;
  ssl_ciphers               'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
  ssl_prefer_server_ciphers off;
  ssl_session_cache         shared:SSL:50m;
  ssl_session_timeout       1d;
  ssl_session_tickets       off;

  # Docker DNS резолвер.
  # ВАЖНО: upstream со статическим server резолвится один раз при старте.
  # Чтобы nginx переразрешал DNS после rebuild контейнеров — используем
  # переменные вместо upstream-блоков (proxy_pass http://$backend_host).
  resolver 127.0.0.11 valid=10s ipv6=off;
  resolver_timeout 5s;

  # Переменные для upstream — nginx резолвит их динамически через Docker DNS.
  # Это единственный надёжный способ избежать кеширования старых IP после rebuild.
  map $host $backend_host  { default "backend:4000";  }
  map $host $frontend_host { default "frontend:3000"; }

  # HTTP -> HTTPS redirect + certbot challenge
  server {
    listen 80 default_server;
    server_name _;
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
  }

  # ── Main app  (lk.hideyou.top) ──────────────────────────────────
  server {
    listen 443 ssl;
    http2  on;
    server_name lk.hideyou.top;

    ssl_certificate     /etc/letsencrypt/live/lk.hideyou.top/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lk.hideyou.top/privkey.pem;

    add_header X-Frame-Options           "SAMEORIGIN"                          always;
    add_header X-Content-Type-Options    "nosniff"                             always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    limit_conn perip 20;

    location /api/auth/ {
      limit_req zone=auth burst=5 nodelay;
      proxy_pass http://$backend_host;
      proxy_http_version 1.1;
      proxy_set_header Connection ""; proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/webhooks/ {
      limit_req zone=webhook burst=100 nodelay;
      proxy_pass http://$backend_host;
      proxy_http_version 1.1;
      proxy_set_header Connection ""; proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 60s;
    }

    location /api/ {
      limit_req zone=api burst=30 nodelay;
      proxy_pass http://$backend_host;
      proxy_http_version 1.1;
      proxy_set_header Connection ""; proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-Proto $scheme;
      proxy_connect_timeout 10s; proxy_read_timeout 30s;
    }

    # Uploaded files (images, icons)
    location /uploads/ {
      proxy_pass http://$backend_host;
      proxy_http_version 1.1; proxy_set_header Connection ""; proxy_set_header Host $host;
      expires 30d; add_header Cache-Control "public"; access_log off;
    }

    location /_next/static/ {
      proxy_pass http://$frontend_host;
      proxy_http_version 1.1; proxy_set_header Connection ""; proxy_set_header Host $host;
      expires 1y; add_header Cache-Control "public, immutable"; access_log off;
    }

    location / {
      proxy_pass http://$frontend_host;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection "upgrade";
      proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }

  # ── Admin panel  (admin.hideyou.top) ──────────────────────────────
  server {
    listen 443 ssl;
    http2  on;
    server_name admin.hideyou.top;

    ssl_certificate     /etc/letsencrypt/live/lk.hideyou.top/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lk.hideyou.top/privkey.pem;

    add_header X-Frame-Options "DENY" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    limit_conn perip 10;

    location = / { return 302 /admin; }

    location /api/ {
      limit_req zone=api burst=20 nodelay;
      proxy_pass http://$backend_host;
      proxy_http_version 1.1; proxy_set_header Connection ""; proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /_next/static/ {
      proxy_pass http://$frontend_host;
      proxy_http_version 1.1; proxy_set_header Host $host;
      expires 1y; add_header Cache-Control "public, immutable"; access_log off;
    }

    location / {
      proxy_pass http://$frontend_host;
      proxy_http_version 1.1; proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-Proto $scheme;
    }
  }

  # ── API subdomain  (api.hideyou.top) ──────────────────────────────
  server {
    listen 443 ssl;
    http2  on;
    server_name api.hideyou.top;

    ssl_certificate     /etc/letsencrypt/live/lk.hideyou.top/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lk.hideyou.top/privkey.pem;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    limit_conn perip 15;

    location /api/webhooks/ {
      limit_req zone=webhook burst=100 nodelay;
      proxy_pass http://$backend_host;
      proxy_http_version 1.1;
      proxy_set_header Connection ""; proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
      limit_req zone=api burst=30 nodelay;
      proxy_pass http://$backend_host;
      proxy_http_version 1.1;
      proxy_set_header Connection ""; proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
